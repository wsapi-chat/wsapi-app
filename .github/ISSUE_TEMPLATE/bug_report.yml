name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Send POST to /messages/text with ...
        2. Observe error ...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or logs if available.

  - type: input
    id: version
    attributes:
      label: WSAPI Version
      description: Output of the version or Docker image tag
      placeholder: v2.0.0

  - type: dropdown
    id: storage
    attributes:
      label: Storage Driver
      options:
        - SQLite
        - PostgreSQL
    validations:
      required: false

  - type: dropdown
    id: publisher
    attributes:
      label: Event Publisher
      options:
        - Webhook
        - Redis
        - None
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Go version, etc.
      placeholder: Ubuntu 24.04, Docker 27.0, Go 1.25
