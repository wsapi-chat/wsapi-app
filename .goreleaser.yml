version: 2

builds:
  - main: ./cmd/server
    binary: wsapi
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers:
  - image_templates:
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/wsapi-chat/wsapi-app"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.licenses=MIT"

  - image_templates:
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/wsapi-chat/wsapi-app"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "docker.io/wsapichat/wsapi:{{ .Tag }}"
    image_templates:
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-amd64"
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-arm64"

  - name_template: "docker.io/wsapichat/wsapi:latest"
    image_templates:
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-amd64"
      - "docker.io/wsapichat/wsapi:{{ .Tag }}-arm64"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
