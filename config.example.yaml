server:
  port: 8080
  readTimeout: "30s"
  writeTimeout: "60s"
  shutdownTimeout: "10s"

database:
  driver: "sqlite" # "sqlite" or "postgres" (env: WSAPI_DB_DRIVER)
  dsn: "./data/wsapi.db" # SQLite path or PostgreSQL connection string (env: WSAPI_DB_DSN)

whatsmeow:
  logLevel: "warn" # debug, info, warn, error (env: WSAPI_WHATSMEOW_LOG_LEVEL)
  pairClientType: "chrome" # chrome, edge, firefox, opera, safari (env: WSAPI_WHATSMEOW_PAIR_CLIENT_TYPE)
  pairClientOs: "Windows" # Windows, Linux, macOS (env: WSAPI_WHATSMEOW_PAIR_CLIENT_OS)

auth:
  adminApiKey: "" # API key for /admin/instances management, sent via X-Api-Key header (env: WSAPI_ADMIN_API_KEY)

logging:
  level: "info" # debug, info, warn, error (env: WSAPI_LOG_LEVEL)
  format: "text" # text or json (env: WSAPI_LOG_FORMAT)
  redactPii: true # redact sensitive fields (message text, media filenames, etc.) from event logs (env: WSAPI_LOG_REDACT)

httpProxy: "" # HTTP proxy URL for outbound requests (env: WSAPI_HTTP_PROXY)

instanceMode:
  "single" # "single" or "multi" (env: WSAPI_INSTANCE_MODE)
  # single: auto-provisions a default instance, no X-Instance-Id header needed, no admin API (default)
  # multi: instances managed via /admin/instances, X-Instance-Id required

instanceDefaults:
  apiKey: "" # Default API key for instances (env: WSAPI_DEFAULT_API_KEY)
  webhookUrl: "" # Default webhook URL (env: WSAPI_DEFAULT_WEBHOOK_URL)
  signingSecret: "" # Default HMAC signing secret (env: WSAPI_DEFAULT_SIGNING_SECRET)
  eventFilters: [] # Default event filters (env: WSAPI_DEFAULT_EVENT_FILTERS)
  historySync: # Default history sync (env: WSAPI_DEFAULT_HISTORY_SYNC)

eventsPublishVia: "webhook" # "webhook", "redis", or "none" (env: WSAPI_PUBLISH_VIA)


# redis:                           # Optional Redis configuration
#   mode: "standalone"             # "standalone" (default) or "sentinel" (env: WSAPI_REDIS_MODE)
#   url: "localhost:6379"          # host:port for standalone; comma-separated sentinel addrs for sentinel (env: WSAPI_REDIS_URL)
#   password: ""                   # (env: WSAPI_REDIS_PASSWORD)
#   db: 0                          # (env: WSAPI_REDIS_DB)
#   streamName: ""                 # Fixed stream name; default: "stream:<instanceId>" (env: WSAPI_REDIS_STREAM_NAME)
#   tls: false                     # Enable TLS (env: WSAPI_REDIS_TLS)
#   tlsInsecure: false             # Skip TLS certificate verification (env: WSAPI_REDIS_TLS_INSECURE)
#   masterName: "mymaster"         # Sentinel master name (env: WSAPI_REDIS_MASTER_NAME)
#   sentinelPassword: ""           # Sentinel auth password (env: WSAPI_REDIS_SENTINEL_PASSWORD)
#   maxRetries: 50                 # Max retries per Redis command (env: WSAPI_REDIS_MAX_RETRIES)
